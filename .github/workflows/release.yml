name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (x.y.z or x.y.z-suffix, no leading v)"
        required: true

permissions:
  contents: write

# One release at a time — parallel runs would race on the version commit and tag.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the tag-exists check sees all tags
          fetch-depth: 0

      # Normal mode: tag absent — stamp, test, commit, tag, publish.
      # Recovery mode: tag exists but the release is missing (a previous run died
      # between push and publish) — republish from the tag, change nothing else.
      # Tag AND release both present → hard fail.
      - name: Validate version
        id: validate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! echo "$VERSION" | grep -Pq '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$'; then
            echo "Invalid version: $VERSION (expected x.y.z or x.y.z-suffix)" >&2
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            if gh release view "v$VERSION" >/dev/null 2>&1; then
              echo "Release v$VERSION already exists" >&2
              exit 1
            fi
            echo "Tag v$VERSION exists without a release — recovery mode (publish only)"
            echo "recovery=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stamp version into files
        if: steps.validate.outputs.recovery != 'true'
        run: |
          sed -i "s/^__version__ = \".*\"/__version__ = \"$VERSION\"/" db_migrate.py
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          grep -q "^__version__ = \"$VERSION\"$" db_migrate.py
          grep -q "^version = \"$VERSION\"$" pyproject.toml

      - uses: astral-sh/setup-uv@v7
        if: steps.validate.outputs.recovery != 'true'
        with:
          enable-cache: true

      # uv sync also refreshes the project version embedded in uv.lock.
      # test.yml only triggers on branch pushes, so the suite must run here.
      - run: uv sync
        if: steps.validate.outputs.recovery != 'true'
      - run: uv run pytest --tb=short
        if: steps.validate.outputs.recovery != 'true'

      - name: Commit, tag, push
        if: steps.validate.outputs.recovery != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add db_migrate.py pyproject.toml uv.lock
          git commit -m "chore(release): v$VERSION"
          git tag "v$VERSION"
          # --atomic: branch + tag land together or not at all — a rejected branch
          # push (master moved during the run) must not leave an orphaned tag.
          git push --atomic origin HEAD "refs/tags/v$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RECOVERY: ${{ steps.validate.outputs.recovery }}
        run: |
          if [ "$RECOVERY" = "true" ]; then
            # The asset must match the tagged commit, not the current branch HEAD
            git checkout "refs/tags/v$VERSION" -- db_migrate.py
            # Guard against hand-pushed tags on unstamped commits: never publish an
            # asset whose embedded version does not match the release version.
            if ! grep -q "^__version__ = \"$VERSION\"$" db_migrate.py; then
              echo "Tagged commit is not stamped with $VERSION — refusing to publish" >&2
              exit 1
            fi
          fi
          prerelease_flag=""
          case "$VERSION" in *-*) prerelease_flag="--prerelease" ;; esac
          gh release create "v$VERSION" db_migrate.py \
            --title "v$VERSION" \
            --generate-notes \
            $prerelease_flag
